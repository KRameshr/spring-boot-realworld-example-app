name: Java CI
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        distribution: zulu
        java-version: '17'
    - uses: actions/cache@v2
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Test with Gradle
      run: ./gradlew clean test
    - name: Start app for contract tests
      run: nohup ./gradlew bootRun > app.log 2>&1 &
    - name: Wait for app to be ready
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/tags > /dev/null; then
            echo "App is ready"
            exit 0
          fi
          sleep 2
        done
        echo "App did not become ready in time"
        cat app.log
        exit 1
    - name: Run Specmatic contract tests
      run: ./gradlew contractTest